name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"
      - name: Check formatting
        run: ruff format --check src/ship_flow tests scripts/install_codex_skill.py scripts/install-codex-skill.py
      - name: Run linter
        run: ruff check src/ship_flow tests scripts/install_codex_skill.py scripts/install-codex-skill.py

  test:
    name: Test (Python ${{ matrix.python-version }})
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package and development tools
        run: python -m pip install -e ".[dev]"
      - name: Unit tests
        run: python -m unittest discover -s tests/unit -v
      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v
      - name: Package smoke test
        run: ship --help
