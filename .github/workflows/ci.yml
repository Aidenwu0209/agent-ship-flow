name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      PYTHONDONTWRITEBYTECODE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and development tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"
      - name: Static checks
        run: |
          ruff format --check src/ship_flow tests scripts/install_codex_skill.py scripts/install-codex-skill.py
          ruff check src/ship_flow tests scripts/install_codex_skill.py scripts/install-codex-skill.py
      - name: Unit tests
        run: python -m unittest discover -s tests/unit -v
      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v
      - name: Package smoke test
        run: ship --help
