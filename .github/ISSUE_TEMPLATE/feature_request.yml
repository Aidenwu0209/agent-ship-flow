name: Feature request
description: Propose an agent-neutral workflow or adapter improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain gate, evidence, recovery, and compatibility effects.
    validations:
      required: true
